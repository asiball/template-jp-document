# =============================================================================
# build.yml — PR ごとにビルド(make pdf)を検証する
#
# ビルドはローカルでも CI でも同じ Docker イメージ内で実行される。CI で毎回
# 通すことで、次を保証する。
#   - Dockerfile の固定ツールチェーン(pandoc/core:3.10 ベースイメージ、
#     Typst / PlantUML / フォントの sha256 検証付き取得)が実際に取得・
#     構築できること
#   - 同梱サンプル(章別ファイル分割・単一ファイルの両方式)が lint を通過し
#     PDF まで到達すること(バージョンを上げる PR ではここが回帰検知になる)
#   - scripts/lint.sh の回帰テスト(make test)が通ること(lint のルール変更
#     による検出漏れ・誤検知をビルド前に検知する)
#   - docs/ 配下の利用者の文書(make pdf-all)。テンプレート時点では対象なし
#     だが、これを元にした下流リポジトリでは docs/ に置いた文書が設定変更
#     なしで自動的にビルド検証される
# 生成した PDF はアーティファクトとして保存し、PR 上で見た目を確認できる。
#
# Docker イメージは actions/cache でキャッシュする(キー = Dockerfile の
# ハッシュ)。Makefile の DOCKER_TAG も同じ Dockerfile 内容ハッシュから
# 導出されるため、キャッシュがヒットしてイメージを読み込めれば
# make pdf 内の docker-build はイメージ存在チェックにより再構築をスキップする。
#
# main への push では実行しない(マージされる内容は直前の PR の実行で検証済み
# のため重複になる)。main を直接検証したい場合は workflow_dispatch で手動実行
# できる。
# =============================================================================
name: build

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Cache Docker image
        id: image-cache
        uses: actions/cache@v4
        with:
          path: /tmp/jp-spec-builder.tar
          key: docker-image-${{ hashFiles('Dockerfile') }}

      - name: Load cached image
        run: |
          if [ -f /tmp/jp-spec-builder.tar ]; then
            docker load -i /tmp/jp-spec-builder.tar
          fi

      - name: Test(scripts/lint.sh の回帰テスト)
        run: make test

      - name: Lint(docs / examples 全件)
        run: make lint

      # イメージキャッシュがヒットしていれば、1 回目の make pdf の
      # docker-build はイメージ存在チェックにより再構築をスキップする。
      # ミス時は 1 回目の make pdf でイメージを構築し、2 回目以降は
      # 同じイメージを使い回す。
      - name: Build sample-spec(章別ファイル分割)
        run: make pdf SRC=examples/sample-spec

      - name: Build wareki-api-spec(単一ファイル + 改訂履歴別ファイル)
        run: make pdf SRC=examples/wareki-api-spec.md

      # 利用者の文書(テンプレート時点では対象なし)。下流リポジトリでは
      # docs/ に置いた文書が設定変更なしで自動的にビルド検証される
      # (docs/ が空なら pdf-all は何もせず終了する)。
      - name: Build docs(利用者の文書。テンプレート時点では対象なし)
        run: make pdf-all

      - name: Save image for cache
        if: steps.image-cache.outputs.cache-hit != 'true'
        run: docker save -o /tmp/jp-spec-builder.tar jp-spec-builder

      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: pdfs
          path: build/*.pdf
          if-no-files-found: error
